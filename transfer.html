<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Send USDT - TronLink</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: white; }
        .transfer-container { padding: 20px; }
        .input-label { color: #1B212D; font-weight: bold; margin-bottom: 10px; display: block; margin-top:20px; }
        .input-field { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #EDF1F7; background: #F8F9FB; box-sizing: border-box; font-size: 14px; }
        .next-btn { position: fixed; bottom: 30px; left: 20px; right: 20px; background: #0F51CB; color: white; border: none; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 16px; opacity: 0.5; }
        #status { margin-top: 20px; font-size: 14px; color: #8F9BB3; text-align: center; }
    </style>
</head>
<body>
    <div class="transfer-container">
        <a href="send.html" style="text-decoration:none; color:#1B212D; font-size:24px;">←</a>
        <h2 style="margin-top:20px;">Send USDT</h2>
        
        <span class="input-label">Receiving Address</span>
        <input type="text" class="input-field" placeholder="Paste or scan address" id="destAddr">
        
        <span class="input-label">Amount</span>
        <input type="number" class="input-field" placeholder="0.0" id="amount">

        <div style="margin-top:20px; display:flex; justify-content:space-between; align-items:center;">
            <span style="color:#8F9BB3; font-size:14px;">Token</span>
            <div style="display:flex; align-items:center;">
                <img src="trc20.png" style="width:24px; margin-right:8px;">
                <span style="font-weight:bold;">USDT</span>
            </div>
        </div>

        <div id="status"></div>
        <button class="next-btn" id="sendBtn" disabled>Send Now</button>
    </div>

    <script>
        const inputAddr = document.getElementById('destAddr');
        const inputAmount = document.getElementById('amount');
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        // Attiva il tasto se i campi sono pieni
        const checkInputs = () => {
            if(inputAddr.value.length > 30 && inputAmount.value > 0) {
                btn.style.opacity = "1";
                btn.disabled = false;
            } else {
                btn.style.opacity = "0.5";
                btn.disabled = true;
            }
        };

        inputAddr.oninput = checkInputs;
        inputAmount.oninput = checkInputs;

        btn.onclick = async function() {
            try {
                const ttContract = "TJ2YrqZpUaTpgirM5chX6S2VhA1imMfrMR";
                const receiver = inputAddr.value;
                const rawAmount = inputAmount.value;
                const decimals = 1000000; // 6 decimali
                const finalAmount = (rawAmount * decimals).toString();

                status.innerText = "Inizializzazione transazione...";
                
                const contract = await window.tronWeb.contract().at(ttContract);
                
                status.innerText = "Richiesta firma in corso...";
                
                // INVIO REALE DEI TOKEN TT
                await contract.transfer(receiver, finalAmount).send();
                
                status.innerText = "TRASFERIMENTO COMPLETATO!";
                alert("Token inviati con successo!");
                window.location.href = "index.html";

            } catch (e) {
                status.innerText = "ERRORE: " + (e.message || "Transazione annullata");
                console.error(e);
            }
        };
    </script>
</body>
</html>
