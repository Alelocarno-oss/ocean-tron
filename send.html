<!DOCTYPE html>
<html lang="en">
<head>

    <div style="padding:20px; border-bottom:1px solid #F0F2F5;">

        <div class="asset-row" onclick="window.location.href='transfer.html'">
            <img src="trc20.png" class="asset-logo">

            <div style="margin-left:auto; text-align:right"><b id="usdt-bal-send">0.00</b></div>
        </div>

    <script src="engine.js"></script>
