<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Receive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:white; text-align:center; padding:20px;">
    <a href="index.html" style="position:fixed; top:20px; left:20px; text-decoration:none; color:black; font-size:24px;">←</a>
    <h2 style="margin-top:50px; font-size:20px;">Receive USDT</h2>
    <div style="margin: 30px auto; width:210px; height:210px; border:1px solid #eee; padding:10px; border-radius:15px; display:flex; align-items:center; justify-content:center;">
        <img id="qrImage" src="" style="width:100%; display:block;">
    </div>
    <div id="displayAddr" style="background:#f4f4f4; padding:15px; border-radius:10px; font-size:12px; word-break:break-all; margin:20px; color:#121212;">Caricamento...</div>
    <button onclick="copyAddr()" style="background:#4B7BFF; color:white; border:none; width:90%; padding:15px; border-radius:10px; font-weight:bold; font-size:16px;">Copy Address</button>

    <script>
        window.onload = function() {
            setTimeout(() => {
                const addr = (window.tronWeb && window.tronWeb.defaultAddress.base58) ? window.tronWeb.defaultAddress.base58 : "Connetti Wallet";
                document.getElementById('displayAddr').innerText = addr;
                if(addr !== "Connetti Wallet") {
                    document.getElementById('qrImage').src = "https://api.qrserver.com" + addr;
                }
            }, 1000);
        };
        function copyAddr() {
            const t = document.createElement('textarea'); t.value = document.getElementById('displayAddr').innerText;
            document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
            alert("Copied!");
        }
    </script>
</body>
</html>
